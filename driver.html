<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>司機端系統</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; }
        .login-box { background: #222; padding: 30px; border-radius: 15px; text-align: center; margin-top: 50px; }
        input { width: 80%; padding: 12px; margin: 20px 0; border-radius: 5px; border: none; font-size: 1.1em; text-align: center; }
        .btn { background: #fbc02d; color: #000; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; font-size: 1.1em; width: 100%; }
        .order-card { background: #1a1a1a; border: 1px solid #333; border-left: 5px solid #fbc02d; padding: 15px; margin-top: 15px; border-radius: 8px; }
        .hidden { display: none; }
        .online-status { color: #4caf50; font-weight: bold; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-box">
        <h2>🚖 司機登入</h2>
        <input type="text" id="driverIdInput" placeholder="請輸入司機編號 (例: E088)">
        <button class="btn" onclick="login()">上線接單</button>
    </div>

    <div id="mainPage" class="hidden">
        <div class="online-status">● 上線中</div>
        <div id="driverTitle" style="text-align: center; font-size: 1.2em; margin-bottom: 20px;"></div>
        <button style="background:#444; color:white;" class="btn" onclick="location.reload()">切換帳號 / 下線</button>
        <hr style="border:0.5px solid #333; margin:20px 0;">
        <div id="orderList"></div>
    </div>

    <script>
        const socket = io();
        let myInfo = null;

        function login() {
            const id = document.getElementById('driverIdInput').value;
            if(!id) return alert("請輸入編號");
            socket.emit('go_online', { driverId: id.trim() });
        }

        socket.on('login_result', (res) => {
            if (res.success) {
                myInfo = res.info;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                document.getElementById('driverTitle').innerText = `你好，${myInfo['名稱']} (${myInfo['司機車牌']})`;
            } else {
                alert(res.msg);
            }
        });

        socket.on('new_order', (order) => {
            const list = document.getElementById('orderList');
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div style="color:#fbc02d; font-size:0.9em;">${order.fleetName}</div>
                <div style="font-size:1.2em; margin:5px 0;">${order.address}</div>
                <div style="color:#888; font-size:0.8em;">單號: ${order.sn} | 備註: ${order.note}</div>
                <button class="btn" style="margin-top:10px; padding:10px;" onclick="accept('${order.sn}')">立即接單</button>
            `;
            list.prepend(card);
            if (navigator.vibrate) navigator.vibrate(500);
        });

        function accept(sn) {
            socket.emit('accept_order', { sn: sn, driverName: myInfo['名稱'] });
            alert("接單成功！");
        }
    </script>
</body>
</html>
